version: '3.8'

services:
  minio:
    image: minio/minio:latest
    container_name: minio-sports
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - sports-network

  app:
    build: .
    container_name: kinetic-app
    ports:
      - "8080:8080"
    depends_on:
      - minio
    networks:
      - sports-network
    volumes:
      - .:/app

volumes:
  minio_data:

networks:
  sports-network:
    driver: bridge
