{{define "event-detail"}}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.PageTitle}} - Kinetic</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    {{template "header" .}}
    
    <main class="main-content">
        <div class="event-detail-container">
            <a href="/events" class="back-link">← Назад к списку</a>
            
            <div class="event-profile">
                <div class="event-header">
                    <span class="event-type-badge">{{.Event.Type}}</span>
                    <h1>{{.Event.Name}}</h1>
                </div>
                
                <div class="event-content">
                    <div class="event-media">
                        <img src="http://localhost:9000/sports/{{.Event.ImageKey}}" alt="{{.Event.Name}}">
                    </div>
                    
                    <div class="event-info">
                        <div class="info-row">
                            <span class="info-label">📅 Дата:</span>
                            <span class="info-value">{{.Event.Date}}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">📍 Локация:</span>
                            <span class="info-value">{{.Event.Location}}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">💰 Стоимость:</span>
                            <span class="info-value price">{{.Event.Price}} ₽</span>
                        </div>
                        
                        <div class="event-description">
                            <h3>Описание</h3>
                            <p>{{.Event.Description}}</p>
                        </div>
                        
                        <button class="btn btn-primary btn-large">Зарегистрироваться</button>
                    </div>
                </div>
            </div>
        </div>
    </main>
    
    {{template "footer" .}}
</body>
</html>
{{end}}
