{{define "home"}}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kinetic - Главная</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="home-page">
    {{template "header" .}}
    
    <main class="home-main">
        <div class="video-background">
            <video autoplay muted loop playsinline>
                <source src="http://localhost:9000/sports/video.mp4" type="video/mp4">
                Ваш браузер не поддерживает видео.
            </video>
            <div class="video-overlay"></div>
        </div>
        
        <div class="home-content">
            <h1 class="home-title">KINETIC</h1>
            <p class="home-subtitle">Built for Performance</p>
            <div class="home-actions">
                <a href="/athletes" class="btn btn-primary btn-large">Атлеты</a>
                <a href="/events" class="btn btn-secondary btn-large">События</a>
            </div>
        </div>
    </main>
    
    {{template "footer" .}}
</body>
</html>
{{end}}
